<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DELPHI — Marsh Regulatory Intelligence</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root {
        background: #070910;
        min-height: 100vh;
      }
    </style>
    <script>
      // Apply saved theme before React loads - prevents any flash
      try {
        var t = JSON.parse(localStorage.getItem('delphi_theme') || '"dark"');
        var bg = t === 'light' ? '#f0f4f8' : '#070910';
        document.documentElement.style.background = bg;
        document.documentElement.style.setProperty('--bg', bg);
      } catch(e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
